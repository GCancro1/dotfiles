# --- General ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0
set -g focus-events on

# --- Prefix: Ctrl+a (easier than Ctrl+b) ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Reload config ---
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# --- Split panes (open in current path) ---
# - splits side-by-side (horizontal), | splits top-bottom (vertical)
bind - split-window -h -c "#{pane_current_path}"
bind | split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

#copy mode
bind c copy-mode


# --- New window in current path ---
# bind c new-window -c "#{pane_current_path}"
bind t new-window -c "#{pane_current_path}"
bind -n M-c new-window -c "#{pane_current_path}"

# --- Close pane ---
bind q kill-pane

# --- Vim-style pane navigation ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind Left select-pane -L
bind Down select-pane -D
bind Up select-pane -U
bind Right select-pane -R

# --- Resize panes with Alt+arrow (no prefix needed) ---
bind -n M-Left resize-pane -L 5
bind -n M-Right resize-pane -R 5
bind -n M-Up resize-pane -U 5
bind -n M-Down resize-pane -D 5

# --- Window navigation with Alt+number ---
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# --- Last window swap ---
bind L last-window
unbind -T root Tab
bind Tab next-window

# --- Copy mode (vim keys) ---
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"

# --- Status bar (clean look) ---
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-interval 5
set -g status-left "#[fg=#89b4fa,bold] #{?pane_zoomed_flag,Z ,}#S "
set -g status-right "#[fg=#a6adc8] #{pane_current_command} | %H:%M "
set -g window-status-current-format "#[fg=#1e1e2e,bg=#89b4fa,bold] #I:#W "
set -g window-status-format "#[fg=#6c7086] #I:#W "

# --- Useful native options ---
set -g monitor-activity on
set -g visual-activity off
set -g silence-action none

# --- Extra useful bindings ---
bind S setw synchronize-panes \; display "Sync #{?pane_synchronized,ON,OFF}"
bind s choose-tree -s
bind Z resize-pane -Z

# --- Launch dev session ---
bind D if-shell "tmux has-session -t dev 2>/dev/null" \
  "switch-client -t dev" \
  "new-session -s dev -n term -d \; \
   new-window -t dev:2 -n nvim \; send-keys -t dev:2 'cd .config/nvim/ && nvim lua/plugins/' Enter \; \
   new-window -t dev:3 -n opencode \; send-keys -t dev:3 'opencode' Enter \; split-window -h -t dev:3 \; send-keys -t dev:3 'opencode' Enter \; \
   select-window -t dev:1 \; switch-client -t dev"

# --- Popup terminal (current dir) ---
bind o display-popup -E -w 98% -h 98% -d "#{pane_current_path}"
bind e display-popup -E -w 98% -h 98% -d send-keys "nvim ~/.tmux.conf"
bind v display-popup -E -w 98% -h 98% -d send-keys "nvim ~/.config/nvim/lua/plugins/"

# --- Plugins (sourced separately for clean reloads) ---
# source-file ~/.tmux/plugins.conf
